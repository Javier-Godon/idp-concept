global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'idp-concept-monitor'
    environment: 'local'

rule_files:
  - 'prometheus-alerts.yaml'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  # OTel Collector metrics
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'otel-collector'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Platform metrics (if exposed separately)
  - job_name: 'platform-metrics'
    static_configs:
      - targets: ['localhost:9091']
    scrape_interval: 30s
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: job
        replacement: 'koncept'

