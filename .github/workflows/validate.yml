name: Validate IDP

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "cmd/**"
      - "docs/**"
      - "framework/**"
      - "projects/**"
      - "scripts/**"
      - "tests/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "cmd/**"
      - "docs/**"
      - "framework/**"
      - "projects/**"
      - "scripts/**"
      - "tests/**"

permissions:
  contents: read

env:
  KCL_VERSION: "0.10.0"
  ERP_DEV_FACTORY: projects/erp_back/pre_releases/manifests/dev/factory

jobs:
  go-cli:
    name: Go CLI tests and smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cmd/koncept/go.mod

      - name: Install KCL
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/kcl.tar.gz \
            "https://github.com/kcl-lang/cli/releases/download/v${KCL_VERSION}/kcl-v${KCL_VERSION}-linux-amd64.tar.gz"
          tar -xzf /tmp/kcl.tar.gz -C /tmp kcl
          sudo install -m 0755 /tmp/kcl /usr/local/bin/kcl
          kcl version

      - name: Warm KCL dependencies
        run: |
          cd framework
          kcl mod update
          kcl test ./tests/builders

      - name: Run Go tests
        working-directory: cmd/koncept
        run: go test ./...

      - name: Build Go CLI
        working-directory: cmd/koncept
        run: go build -o bin/koncept .

      - name: Go CLI doctor
        working-directory: cmd/koncept
        run: ./bin/koncept --factory "$GITHUB_WORKSPACE/${{ env.ERP_DEV_FACTORY }}" doctor

      - name: Go CLI render smoke
        working-directory: cmd/koncept
        run: |
          set -euo pipefail
          for output in yaml argocd helmfile helm kusion kustomize timoni crossplane backstage; do
            ./bin/koncept --factory "$GITHUB_WORKSPACE/${{ env.ERP_DEV_FACTORY }}" --output "/tmp/koncept-${output}" render "$output"
          done
          test -s /tmp/koncept-yaml/kubernetes_manifests.yaml
          test -s /tmp/koncept-kusion/kusion_spec.yaml

      - name: Go CLI policy gate
        working-directory: cmd/koncept
        run: ./bin/koncept --factory "$GITHUB_WORKSPACE/${{ env.ERP_DEV_FACTORY }}" policy check

      - name: Changelog fragment check
        run: ./cmd/koncept/bin/koncept changelog check

      - name: Golden render drift check
        env:
          KONCEPT: ${{ github.workspace }}/cmd/koncept/bin/koncept
        run: ./scripts/golden.sh check

      - name: Generated scaffold golden check
        env:
          KONCEPT: ${{ github.workspace }}/cmd/koncept/bin/koncept
        run: ./scripts/golden_generated.sh check

      - name: Go CLI scaffold smoke
        working-directory: cmd/koncept
        run: |
          set -euo pipefail
          mkdir -p /tmp/scaffold/projects
          ln -s "$GITHUB_WORKSPACE/framework" /tmp/scaffold/framework
          ./bin/koncept init project "Smoke Service" --dest /tmp/scaffold/projects
          ./bin/koncept policy check --factory /tmp/scaffold/projects/smoke_service/pre_releases/manifests/dev/factory

  repository-verify:
    name: Repository verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install KCL
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/kcl.tar.gz \
            "https://github.com/kcl-lang/cli/releases/download/v${KCL_VERSION}/kcl-v${KCL_VERSION}-linux-amd64.tar.gz"
          tar -xzf /tmp/kcl.tar.gz -C /tmp kcl
          sudo install -m 0755 /tmp/kcl /usr/local/bin/kcl
          kcl version

      - name: Run canonical verification
        run: ./scripts/verify.sh

  documentation-lint:
    name: Documentation lint and link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint markdown (markdownlint)
        uses: nosborn/github-action-markdown-cli@v3.3.0
        with:
          files: docs
          config_file: .github/.markdownlint.json

      - name: Check broken links (lychee)
        uses: lycheeverse/lychee-action@v1.9.3
        with:
          fail: true
          args: --offline --exclude "ghcr.io|docker.io|github.com|pkg.go.dev" docs/**/*.md README.md

  diff-check:
    name: Diff whitespace check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check diff whitespace
        run: git diff --check
