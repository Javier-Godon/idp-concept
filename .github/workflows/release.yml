name: Full Platform Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: javier-godon

jobs:

  # ------------------------------------------------------------
  # 1. BUILD CLI BINARIES
  # ------------------------------------------------------------
  build-cli:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build binaries
        run: |
          mkdir -p dist

          GOOS=linux GOARCH=amd64 go build -o dist/koncept-linux-amd64 ./cmd/koncept
          GOOS=linux GOARCH=arm64 go build -o dist/koncept-linux-arm64 ./cmd/koncept
          GOOS=darwin GOARCH=amd64 go build -o dist/koncept-darwin-amd64 ./cmd/koncept

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-binaries
          path: dist/*

  # ------------------------------------------------------------
  # 2. CREATE GITHUB RELEASE (FOR WGET INSTALL)
  # ------------------------------------------------------------
  github-release:
    needs: build-cli
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: cli-binaries
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.build-cli.outputs.version }}
          name: Release v${{ needs.build-cli.outputs.version }}
          files: |
            dist/koncept-linux-amd64
            dist/koncept-linux-arm64
            dist/koncept-darwin-amd64

  # ------------------------------------------------------------
  # 3. BUILD & PUSH CLI CONTAINER IMAGE
  # ------------------------------------------------------------
  publish-image:
    needs: build-cli
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push image
        run: |
          VERSION=${{ needs.build-cli.outputs.version }}

          IMAGE=ghcr.io/${OWNER}/idp-concept/koncept

          docker build -f cmd/koncept/Dockerfile \
            -t $IMAGE:$VERSION \
            -t $IMAGE:latest .

          docker push $IMAGE:$VERSION
          docker push $IMAGE:latest

  # ------------------------------------------------------------
  # 4. PUBLISH FRAMEWORK (ORAS / OCI)
  # ------------------------------------------------------------
  publish-framework:
    needs: build-cli
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ORAS
        run: |
          curl -LO https://github.com/oras-project/oras/releases/download/v1.1.0/oras_1.1.0_linux_amd64.tar.gz
          tar -xzf oras_1.1.0_linux_amd64.tar.gz
          sudo mv oras /usr/local/bin/

      - name: Login GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io \
            -u "${{ github.actor }}" --password-stdin

      - name: Package framework
        run: |
          tar -czf framework.tar.gz -C framework .

      - name: Push framework OCI artifact
        run: |
          VERSION=${{ needs.build-cli.outputs.version }}

          oras push \
            ghcr.io/${OWNER}/idp-concept-framework:$VERSION \
            framework.tar.gz:application/vnd.oras.layer.v1.tar+gzip