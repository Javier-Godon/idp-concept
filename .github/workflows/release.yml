name: Release koncept

# Phase A of the IDP Evolution Plan: ship the Go CLI as the primary, packaged
# interface. On a version tag this builds cross-platform binaries with
# checksums, publishes them on the GitHub Release, and pushes a pinned CI
# container image (kcl toolchain bundled) to GHCR.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version to build (e.g. v1.0.0). Binaries only; no publish."
        required: false
        default: "dev"

permissions:
  contents: write
  packages: write
  id-token: write # for cosign signing

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/koncept

jobs:
  binaries:
    name: Build binaries and checksums
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
      hash-file: ${{ steps.hash.outputs.file }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cmd/koncept/go.mod

      - name: Cross-compile and checksum
        working-directory: cmd/koncept
        run: make checksums

      - name: Test all binaries
        working-directory: cmd/koncept
        run: make test-binaries

      - name: Create distribution archives
        working-directory: cmd/koncept
        run: make dist-archives

      - name: Generate hashes for SLSA provenance
        id: hash
        run: |
          set -euo pipefail
          HASHFILE="cmd/koncept/bin/SHA256SUMS"
          {
            echo 'hashes<<EOF'
            cat "$HASHFILE"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
          echo "file=$HASHFILE" >> "$GITHUB_OUTPUT"

      - name: Install syft for SBOM generation
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM (CycloneDX format)
        run: |
          mkdir -p cmd/koncept/sbom
          for binary in cmd/koncept/bin/koncept-*; do
            filename=$(basename "$binary")
            syft "$binary" -o cyclonedx-xml > "cmd/koncept/sbom/${filename}.sbom.xml"
          done

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign binaries with cosign
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          for binary in cmd/koncept/bin/koncept-*; do
            cosign sign-blob --yes \
              --bundle "cmd/koncept/bin/$(basename "$binary").bundle" \
              "$binary"
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: koncept-binaries
          path: |
            cmd/koncept/bin/koncept-*
            cmd/koncept/bin/SHA256SUMS
            cmd/koncept/bin/*.bundle
            cmd/koncept/sbom/*
            cmd/koncept/dist/*
          retention-days: 90

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cmd/koncept/bin/koncept-*
            cmd/koncept/bin/SHA256SUMS
            cmd/koncept/bin/*.bundle
            cmd/koncept/sbom/*
            cmd/koncept/dist/*
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}

  image:
    name: Build and push container image
    runs-on: ubuntu-latest
    needs: binaries
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: cmd/koncept/Dockerfile
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest

  provenance:
    name: Generate SLSA provenance
    runs-on: ubuntu-latest
    needs: binaries
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: koncept-binaries
          path: artifacts

      - name: Generate SLSA provenance
        uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v1.9.0
        with:
          base64-subjects: ${{ needs.binaries.outputs.hashes }}
          provenance-name: "koncept.provenance.json"
          upload: true

      - name: Publish SLSA provenance to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            koncept.provenance.json
