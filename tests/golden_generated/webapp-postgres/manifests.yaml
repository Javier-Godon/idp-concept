apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp-postgres-api
  namespace: webapp-postgres-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webapp-postgres-api
  template:
    metadata:
      labels:
        app: webapp-postgres-api
    spec:
      containers:
      - env:
        - name: APP_PROFILE
          value: default
        image: ghcr.io/example/webapp-postgres-api:0.1.0
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 10
        name: webapp-postgres-api
        ports:
        - containerPort: 8080
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /readyz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          successThreshold: 1
          timeoutSeconds: 10
        resources:
          limits:
            cpu: '1'
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: webapp-postgres-api
  namespace: webapp-postgres-apps
spec:
  ports:
  - port: 8080
  selector:
    app: webapp-postgres-api
  type: ClusterIP
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: webapp-postgres-postgres
  namespace: webapp-postgres-apps
spec:
  instances: 1
  enableSuperuserAccess: false
  enablePDB: true
  storage:
    size: 1Gi
  monitoring: {}
---
apiVersion: v1
kind: Namespace
metadata:
  name: webapp-postgres-apps