apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp-kafka-api
  namespace: webapp-kafka-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webapp-kafka-api
  template:
    metadata:
      labels:
        app: webapp-kafka-api
    spec:
      containers:
      - env:
        - name: APP_PROFILE
          value: default
        image: ghcr.io/example/webapp-kafka-api:0.1.0
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 10
        name: webapp-kafka-api
        ports:
        - containerPort: 8080
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /readyz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          successThreshold: 1
          timeoutSeconds: 10
        resources:
          limits:
            cpu: '1'
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: webapp-kafka-api
  namespace: webapp-kafka-apps
spec:
  ports:
  - port: 8080
  selector:
    app: webapp-kafka-api
  type: ClusterIP
---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: webapp-kafka-kafka
  namespace: webapp-kafka-apps
spec:
  kafka:
    version: 3.8.0
    replicas: 1
    listeners:
    - name: plain
      port: 9092
      type: internal
      tls: false
    - name: tls
      port: 9093
      type: internal
      tls: true
    - name: external
      port: 9094
      type: nodeport
      tls: false
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
      inter.broker.protocol.version: '3.8'
    storage:
      type: jbod
      volumes:
      - id: 0
        type: persistent-claim
        size: 1Gi
        deleteClaim: false
  kraftMode: {}
  entityOperator:
    topicOperator: {}
    userOperator: {}
---
apiVersion: v1
kind: Namespace
metadata:
  name: webapp-kafka-apps