apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp-redis-api
  namespace: webapp-redis-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webapp-redis-api
  template:
    metadata:
      labels:
        app: webapp-redis-api
    spec:
      containers:
      - env:
        - name: APP_PROFILE
          value: default
        image: ghcr.io/example/webapp-redis-api:0.1.0
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 10
        name: webapp-redis-api
        ports:
        - containerPort: 8080
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /readyz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          successThreshold: 1
          timeoutSeconds: 10
        resources:
          limits:
            cpu: '1'
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: webapp-redis-api
  namespace: webapp-redis-apps
spec:
  ports:
  - port: 8080
  selector:
    app: webapp-redis-api
  type: ClusterIP
---
apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: Redis
metadata:
  name: webapp-redis-redis
  namespace: webapp-redis-apps
spec:
  kubernetesConfig:
    image: quay.io/opstree/redis:v7.0.12
  storage:
    volumeClaimTemplate:
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Namespace
metadata:
  name: webapp-redis-apps