apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: xquestdbinstances.koncept.bluesolution.es
  annotations:
    koncept.io/tier: "2"
    koncept.io/deployment-method: "helm"
    koncept.io/chart: "questdb/questdb"
    koncept.io/last-reviewed: "2026-06-04"
spec:
  scope: Cluster
  group: koncept.bluesolution.es
  names:
    kind: XQuestDBInstance
    plural: xquestdbinstances
  claimNames:
    kind: QuestDBInstance
    plural: questdbinstances
  defaultCompositionRef:
    name: xquestdbinstance-helm-composition
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      additionalPrinterColumns:
        - name: NAMESPACE
          type: string
          jsonPath: .spec.namespace
        - name: VERSION
          type: string
          jsonPath: .spec.chartVersion
          description: Helm chart version
        - name: STORAGE
          type: string
          jsonPath: .spec.storageSize
        - name: READY
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: AGE
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              description: QuestDB instance configures a QuestDB time-series database via Helm chart.
              required:
                - namespace
              properties:
                namespace:
                  type: string
                  description: Kubernetes namespace where QuestDB runs.
                clusterName:
                  type: string
                  description: Release name / cluster identifier (Claim name if unset).
                  default: ""
                chartVersion:
                  type: string
                  description: "QuestDB Helm chart version (e.g., 0.32.0)."
                  default: "0.32.0"
                storageSize:
                  type: string
                  description: PVC storage size (e.g., 50Gi, 100Gi).
                  default: "50Gi"
                  pattern: "^[0-9]+(Mi|Gi|Ti)$"
                storageClass:
                  type: string
                  description: StorageClass name. Leave empty for the cluster default.
                  default: ""
                resourceCpuRequest:
                  type: string
                  description: CPU request.
                  default: "500m"
                resourceMemoryRequest:
                  type: string
                  description: Memory request.
                  default: "1Gi"
                resourceCpuLimit:
                  type: string
                  description: CPU limit.
                  default: "2"
                resourceMemoryLimit:
                  type: string
                  description: Memory limit.
                  default: "4Gi"
                httpPort:
                  type: integer
                  description: HTTP API port.
                  default: 9000
                  minimum: 1
                  maximum: 65535
                pgPort:
                  type: integer
                  description: PostgreSQL wire protocol port.
                  default: 5432
                  minimum: 1
                  maximum: 65535
                ilpPort:
                  type: integer
                  description: Influx Line Protocol port.
                  default: 9009
                  minimum: 1
                  maximum: 65535
                persistence:
                  type: boolean
                  description: "Whether to enable persistent storage."
                  default: true
                environment:
                  type: string
                  description: "Target environment tier: local, development, staging, production."
                  default: production
                  enum:
                    - local
                    - development
                    - staging
                    - production
                owner:
                  type: string
                  description: "Team or system that owns this instance (for labeling/RBAC)."
                  default: ""
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                releaseName:
                  type: string
                  description: The name of the generated Helm Release.
                serviceEndpoint:
                  type: string
                  description: QuestDB HTTP API endpoint.

