## OpenSearch XR/Claim instance examples
---
apiVersion: koncept.bluesolution.es/v1alpha1
kind: XOpenSearchCluster
metadata:
  name: logs-opensearch
spec:
  namespace: logging-system
  clusterName: logs-cluster
  version: "2.13.0"
  nodePoolCount: 3
  diskSize: "100Gi"
  storageClass: "fast-nvme"
  includeDashboards: true
  dashboardReplicas: 2
  enableSecurity: true
  enableMonitoring: true
  environment: production
  owner: logging-team
---
apiVersion: koncept.bluesolution.es/v1alpha1
kind: OpenSearchCluster
metadata:
  name: dev-opensearch
  namespace: dev-logging
spec:
  namespace: dev-logging
  version: "2.13.0"
  nodePoolCount: 1
  diskSize: "20Gi"
  includeDashboards: true
  dashboardReplicas: 1
  enableSecurity: false
  enableMonitoring: false
  environment: development
  owner: dev-team

