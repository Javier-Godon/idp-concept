## OpenTelemetry Collector Composition — Helm Operator pattern
##
## Prerequisites:
##   - Helm provider is installed
##   - OpenTelemetry Helm repository is added:
##     helm repo add open-telemetry https://open-telemetry.github.io/opentelemetry-helm-charts
##     helm repo update

apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xopentelemetrycollector-helm-composition
  annotations:
    koncept.io/deployment-method: "helm"
    koncept.io/operator: "opentelemetry"
    koncept.io/pattern: "helm-release"
spec:
  compositeTypeRef:
    apiVersion: koncept.bluesolution.es/v1alpha1
    kind: XOpenTelemetryCollector
  mode: Pipeline
  pipeline:

    - step: render-resources
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:

          - name: ns-otel
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              spec:
                providerConfigRef:
                  name: provider-kubernetes
                forProvider:
                  manifest:
                    apiVersion: v1
                    kind: Namespace
                    metadata:
                      name: opentelemetry
                      labels:
                        koncept.io/managed-by: crossplane
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.namespace
                toFieldPath: spec.forProvider.manifest.metadata.name
              - type: FromCompositeFieldPath
                fromFieldPath: spec.owner
                toFieldPath: spec.forProvider.manifest.metadata.labels["koncept.io/owner"]

          - name: otel-operator-helm-release
            base:
              apiVersion: helm.crossplane.io/v1beta1
              kind: Release
              spec:
                forProvider:
                  namespace: opentelemetry
                  chart:
                    name: opentelemetry-operator
                    repository: https://open-telemetry.github.io/opentelemetry-helm-charts
                    version: "0.100.0"
                  values:
                    manager:
                      replicas: 1
                      resources:
                        requests:
                          cpu: "200m"
                          memory: "400Mi"
                        limits:
                          cpu: "1"
                          memory: "2Gi"
                    admissionWebhooks:
                      enabled: true
                providerConfigRef:
                  name: provider-helm
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: metadata.name
              - type: FromCompositeFieldPath
                fromFieldPath: spec.clusterName
                toFieldPath: metadata.name
                policy:
                  fromFieldPath: Optional
              - type: FromCompositeFieldPath
                fromFieldPath: spec.namespace
                toFieldPath: spec.forProvider.namespace
              - type: FromCompositeFieldPath
                fromFieldPath: spec.chartVersion
                toFieldPath: spec.forProvider.chart.version
              # Manager replicas
              - type: FromCompositeFieldPath
                fromFieldPath: spec.replicas
                toFieldPath: spec.forProvider.values.manager.replicas
              # Resource requests
              - type: FromCompositeFieldPath
                fromFieldPath: spec.resourceCpuRequest
                toFieldPath: spec.forProvider.values.manager.resources.requests.cpu
              - type: FromCompositeFieldPath
                fromFieldPath: spec.resourceMemoryRequest
                toFieldPath: spec.forProvider.values.manager.resources.requests.memory
              # Resource limits
              - type: FromCompositeFieldPath
                fromFieldPath: spec.resourceCpuLimit
                toFieldPath: spec.forProvider.values.manager.resources.limits.cpu
              - type: FromCompositeFieldPath
                fromFieldPath: spec.resourceMemoryLimit
                toFieldPath: spec.forProvider.values.manager.resources.limits.memory

    - step: sequence-creation
      functionRef:
        name: function-sequencer
      input:
        apiVersion: sequencer.fn.crossplane.io/v1beta1
        kind: Input
        rules:
          - sequence:
              - ns-otel
              - otel-operator-helm-release

    - step: automatically-detect-readiness
      functionRef:
        name: function-auto-ready

