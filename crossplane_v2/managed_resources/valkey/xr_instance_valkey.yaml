## Valkey XR/Claim instance examples
---
apiVersion: koncept.bluesolution.es/v1alpha1
kind: XValkeyInstance
metadata:
  name: app-cache-valkey
spec:
  namespace: app-cache
  clusterName: app-cache
  mode: standalone
  nodeCount: 1
  storageSize: "50Gi"
  storageClass: "fast-nvme"
  image: "valkey/valkey:latest"
  resourceCpuRequest: "250m"
  resourceMemoryRequest: "512Mi"
  resourceCpuLimit: "1"
  resourceMemoryLimit: "2Gi"
  environment: production
  owner: app-team
---
## Cluster mode Valkey
apiVersion: koncept.bluesolution.es/v1alpha1
kind: XValkeyInstance
metadata:
  name: distributed-cache-valkey
spec:
  namespace: cache-system
  clusterName: distributed-cache
  mode: cluster
  nodeCount: 6
  storageSize: "100Gi"
  storageClass: "fast-nvme"
  image: "valkey/valkey:latest"
  resourceCpuRequest: "500m"
  resourceMemoryRequest: "1Gi"
  resourceCpuLimit: "2"
  resourceMemoryLimit: "4Gi"
  environment: production
  owner: cache-team
---
## Namespace-scoped Claim (product-team usage — preferred)
apiVersion: koncept.bluesolution.es/v1alpha1
kind: ValkeyInstance
metadata:
  name: dev-cache
  namespace: dev-apps
spec:
  namespace: dev-apps
  mode: standalone
  nodeCount: 1
  storageSize: "5Gi"
  image: "valkey/valkey:latest"
  environment: development
  owner: dev-team

