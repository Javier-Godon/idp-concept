## Data Prepper XR/Claim instance examples
---
apiVersion: koncept.bluesolution.es/v1alpha1
kind: XDataPrepperPipeline
metadata:
  name: prod-dataprepper
spec:
  namespace: logging-system
  clusterName: prod-dataprepper
  replicas: 2
  image: "opensearchproject/data-prepper"
  imageTag: "2.2.0"
  sourcePort: 21890
  servicePort: 21890
  opensearchHost: "opensearch.logging-system.svc.cluster.local"
  opensearchPort: 9200
  resourceCpuRequest: "1"
  resourceMemoryRequest: "2Gi"
  resourceCpuLimit: "4"
  resourceMemoryLimit: "8Gi"
  environment: production
  owner: logging-team
---
apiVersion: koncept.bluesolution.es/v1alpha1
kind: DataPrepperPipeline
metadata:
  name: dev-dataprepper
  namespace: dev-logging
spec:
  namespace: dev-logging
  replicas: 1
  image: "opensearchproject/data-prepper"
  imageTag: "2.2.0"
  sourcePort: 21890
  servicePort: 21890
  opensearchHost: "opensearch.dev-logging.svc.cluster.local"
  opensearchPort: 9200
  environment: development
  owner: dev-team

