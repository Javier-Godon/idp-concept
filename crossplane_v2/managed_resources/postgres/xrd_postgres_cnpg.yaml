apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: xpostgresinstances.koncept.bluesolution.es
  annotations:
    koncept.io/tier: "2"
    koncept.io/operator: "cloudnative-pg"
    koncept.io/operator-version: "1.24.x"
    koncept.io/last-reviewed: "2026-06-01"
spec:
  scope: Cluster
  group: koncept.bluesolution.es
  names:
    kind: XPostgresInstance
    plural: xpostgresinstances
  # Namespace-scoped Claims for product teams: one claim per database
  claimNames:
    kind: PostgresInstance
    plural: postgresinstances
  defaultCompositionRef:
    name: xpostgresinstance-cnpg-composition
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      additionalPrinterColumns:
        - name: NAMESPACE
          type: string
          jsonPath: .spec.namespace
        - name: INSTANCES
          type: integer
          jsonPath: .spec.instances
          description: Number of PostgreSQL instances in the cluster
        - name: STORAGE
          type: string
          jsonPath: .spec.storageSize
        - name: PG-VERSION
          type: string
          jsonPath: .spec.postgresVersion
        - name: READY
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: AGE
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              description: PostgresInstance configures a CloudNativePG-managed PostgreSQL cluster.
              required:
                - namespace
                - dbName
              properties:
                namespace:
                  type: string
                  description: Kubernetes namespace where the PostgreSQL cluster runs.
                dbName:
                  type: string
                  description: Name of the primary database created on bootstrap.
                  pattern: "^[a-z][a-z0-9_]{0,62}$"
                ownerUsername:
                  type: string
                  description: PostgreSQL username for the database owner. Defaults to the dbName.
                  default: ""
                instances:
                  type: integer
                  description: "Number of PostgreSQL instances (1 = standalone, 3+ = HA)."
                  default: 1
                  minimum: 1
                  maximum: 9
                storageSize:
                  type: string
                  description: PVC storage size for each instance (e.g. 10Gi, 50Gi).
                  default: "10Gi"
                  pattern: "^[0-9]+(Mi|Gi|Ti)$"
                storageClass:
                  type: string
                  description: StorageClass name. Leave empty for the cluster default.
                  default: ""
                postgresVersion:
                  type: integer
                  description: "Major PostgreSQL version to deploy (16, 17)."
                  default: 16
                  enum:
                    - 16
                    - 17
                enableBackups:
                  type: boolean
                  description: Whether to enable Barman-based object-store backups.
                  default: false
                backupSchedule:
                  type: string
                  description: Cron schedule for scheduled backups (requires enableBackups).
                  default: "0 0 * * *"
                environment:
                  type: string
                  description: "Target environment tier: local, development, staging, production."
                  default: production
                  enum:
                    - local
                    - development
                    - staging
                    - production
                owner:
                  type: string
                  description: "Team or system that owns this database (for labeling/RBAC)."
                  default: ""
                connectionSecretName:
                  type: string
                  description: >
                    Override the default name of the Kubernetes Secret that CNPG writes
                    connection credentials into. Defaults to <claim-name>-connection.
                  default: ""
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                clusterName:
                  type: string
                  description: The name of the generated CNPG Cluster resource.
                connectionSecretRef:
                  type: string
                  description: The name of the Secret containing PostgreSQL credentials.
                primaryEndpoint:
                  type: string
                  description: Read-write service endpoint for PostgreSQL connections.
                readonlyEndpoint:
                  type: string
                  description: Read-only service endpoint for replica connections.
                readyInstances:
                  type: integer
                  description: Number of instances currently Ready.
