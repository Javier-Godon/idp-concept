apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: new-rabbitmq-cluster
  title: New RabbitMQ Cluster
  description: |
    Create a new RabbitMQ cluster using the RabbitMQ Cluster Operator
    via the KCL RabbitMQClusterModule template.
  tags:
    - kcl
    - kubernetes
    - rabbitmq
    - messaging
spec:
  owner: platform-team
  type: resource
  parameters:
    - title: Cluster Details
      required:
        - name
        - namespace
      properties:
        name:
          title: Cluster Name
          type: string
          pattern: "^[a-z][a-z0-9-]*$"
          ui:autofocus: true
        namespace:
          title: Kubernetes Namespace
          type: string
          default: infra

    - title: Configuration
      properties:
        replicas:
          title: Replicas
          type: integer
          default: 3
          minimum: 1
          maximum: 7
        storageSize:
          title: Storage Size
          type: string
          default: "10Gi"
        additionalPlugins:
          title: Additional Plugins
          type: array
          items:
            type: string
          description: RabbitMQ plugins to enable (rabbitmq_management is always included)

    - title: Target Environment
      required:
        - environment
        - outputFormat
      properties:
        environment:
          title: Environment
          type: string
          default: dev
          enum:
            - dev
            - stg
            - production
        outputFormat:
          title: Output Format
          type: string
          default: argocd
          enum:
            - argocd
            - helmfile
            - kustomize
            - crossplane
        repoUrl:
          title: Repository
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com

  steps:
    - id: scaffold
      name: Initialize RabbitMQ module
      action: koncept:init
      input:
        template: rabbitmq
        name: ${{ parameters.name }}
        namespace: ${{ parameters.namespace }}

    - id: validate
      name: Validate configuration
      action: koncept:validate

    - id: render
      name: Render manifests
      action: koncept:render
      input:
        output: ${{ parameters.outputFormat }}

    - id: publish
      name: Open Pull Request
      action: publish:github:pull-request
      input:
        repoUrl: ${{ parameters.repoUrl }}
        title: "feat: add ${{ parameters.name }} RabbitMQ cluster"
        branchName: feat/add-${{ parameters.name }}

  output:
    links:
      - title: Pull Request
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: View in Catalog
        entityRef: resource:default/${{ parameters.name }}
