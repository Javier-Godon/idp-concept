apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: new-mongodb-database
  title: New MongoDB Database
  description: |
    Create a new MongoDB replica set using the MongoDB Community Operator
    via the KCL MongoDBCommunityModule template.
  tags:
    - kcl
    - kubernetes
    - mongodb
    - database
spec:
  owner: platform-team
  type: resource
  parameters:
    - title: Database Details
      required:
        - name
        - namespace
      properties:
        name:
          title: Instance Name
          type: string
          pattern: "^[a-z][a-z0-9-]*$"
          ui:autofocus: true
        namespace:
          title: Kubernetes Namespace
          type: string
          default: data
        mongoVersion:
          title: MongoDB Version
          type: string
          default: "7.0.12"
          enum:
            - "6.0.16"
            - "7.0.12"
          description: MongoDB server version

    - title: Cluster Configuration
      properties:
        members:
          title: Replica Set Members
          type: integer
          default: 3
          minimum: 1
          maximum: 7
          description: Number of replica set members (odd numbers recommended)
        storageSize:
          title: Storage Size
          type: string
          default: "10Gi"

    - title: Target Environment
      required:
        - environment
        - outputFormat
      properties:
        environment:
          title: Environment
          type: string
          default: dev
          enum:
            - dev
            - stg
            - production
        outputFormat:
          title: Output Format
          type: string
          default: argocd
          enum:
            - argocd
            - helmfile
            - kustomize
            - crossplane
        repoUrl:
          title: Repository
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com

  steps:
    - id: scaffold
      name: Initialize MongoDB module
      action: koncept:init
      input:
        template: mongodb
        name: ${{ parameters.name }}
        namespace: ${{ parameters.namespace }}

    - id: validate
      name: Validate configuration
      action: koncept:validate

    - id: render
      name: Render manifests
      action: koncept:render
      input:
        output: ${{ parameters.outputFormat }}

    - id: publish
      name: Open Pull Request
      action: publish:github:pull-request
      input:
        repoUrl: ${{ parameters.repoUrl }}
        title: "feat: add ${{ parameters.name }} MongoDB database"
        branchName: feat/add-${{ parameters.name }}

  output:
    links:
      - title: Pull Request
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: View in Catalog
        entityRef: resource:default/${{ parameters.name }}
