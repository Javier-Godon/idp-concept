groups:
  - name: koncept-alerts
    interval: 30s
    rules:
      # High error rate alert
      - alert: HighRenderErrorRate
        expr: |
          (rate(platform_render_error_total[5m]) / on() group_left() rate(platform_render_total[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
          service: koncept
        annotations:
          summary: "IDP: High render error rate detected"
          description: "Render error rate is {{ $value | humanizePercentage }} (threshold: 10%) on instance {{ $labels.instance }}"
          runbook: "/docs/E2_OPERATING_RUNBOOK.md#troubleshooting"

      # Slow render alert
      - alert: SlowRenderTime
        expr: |
          histogram_quantile(0.95, rate(platform_render_duration_seconds_bucket[5m])) > 30
        for: 10m
        labels:
          severity: warning
          service: koncept
        annotations:
          summary: "IDP: Slow render times detected"
          description: "p95 render time is {{ $value | humanizeDuration }} (threshold: 30s) for format {{ $labels.format }}"
          runbook: "/docs/OCI_FRAMEWORK_USAGE.md#performance-tuning"

      # Validation failure rate alert
      - alert: HighValidationFailureRate
        expr: |
          (rate(platform_validate_failed_total[5m]) / on() group_left() rate(platform_validate_total[5m])) > 0.05
        for: 10m
        labels:
          severity: warning
          service: koncept
        annotations:
          summary: "IDP: High validation failure rate"
          description: "Validation failure rate is {{ $value | humanizePercentage }} (threshold: 5%)"

      # Policy violation alert
      - alert: HighPolicyViolationRate
        expr: |
          rate(platform_policy_violations_total[5m]) > 1
        for: 10m
        labels:
          severity: critical
          service: koncept
        annotations:
          summary: "IDP: Policy violations detected"
          description: "{{ $value }} policy violations per second"
          runbook: "/docs/FRAMEWORK_SCHEMAS.md#policies"

      # Collector backlog alert
      - alert: OTelCollectorBacklog
        expr: |
          rate(otelcol_processor_dropped_spans{processor="batch"}[5m]) > 0
        for: 5m
        labels:
          severity: warning
          service: otel-collector
        annotations:
          summary: "OTLP Collector: Spans being dropped"
          description: "Collector is dropping spans due to backlog. Check collector resources."

      # Low availability alert
      - alert: PlatformMetricsUnavailable
        expr: |
          up{job="platform-metrics"} == 0
        for: 5m
        labels:
          severity: critical
          service: koncept
        annotations:
          summary: "IDP: Metrics collection unavailable"
          description: "Platform metrics endpoint is not responding"

      # Component health
      - alert: UnhealthyTemplateComponent
        expr: |
          platform_template_health{status="unhealthy"} > 0
        for: 10m
        labels:
          severity: warning
          service: koncept
        annotations:
          summary: "IDP: Unhealthy template component detected"
          description: "Template {{ $labels.template }} is reporting health status: {{ $labels.status }}"

      # Capacity alerts
      - alert: HighConcurrentRenders
        expr: |
          platform_concurrent_renders > 50
        for: 5m
        labels:
          severity: info
          service: koncept
        annotations:
          summary: "IDP: High concurrent render load"
          description: "{{ $value }} concurrent renders active (threshold: 50)"

      # Resource usage alerts
      - alert: HighMemoryUsage
        expr: |
          process_resident_memory_bytes{job="platform-metrics"} / (1024*1024) > 1024
        for: 10m
        labels:
          severity: warning
          service: koncept
        annotations:
          summary: "IDP: High memory consumption"
          description: "Memory usage is {{ $value | humanize }}MB"

      # Trend alerts (calculated from history)
      - alert: IncreasingErrorTrend
        expr: |
          (rate(platform_render_error_total[1h]) > rate(platform_render_error_total[1h] offset 7d))
        for: 30m
        labels:
          severity: info
          service: koncept
        annotations:
          summary: "IDP: Increasing error trend over the week"
          description: "Error rate has increased compared to the same time last week"

      # SLO alerts
      - alert: RenderTimeSLOViolation
        expr: |
          histogram_quantile(0.95, rate(platform_render_duration_seconds_bucket[1h])) > 5
        for: 15m
        labels:
          severity: warning
          service: koncept
          slo: "render-time"
        annotations:
          summary: "IDP: Render time SLO violated"
          description: "Render time p95 SLO (5s) is being violated. Current: {{ $value | humanizeDuration }}"

      - alert: AvailabilitySLOViolation
        expr: |
          (rate(platform_render_error_total[1h]) > 0.01)
        for: 30m
        labels:
          severity: critical
          service: koncept
          slo: "availability"
        annotations:
          summary: "IDP: Availability SLO violated"
          description: "Error rate exceeded 1% threshold. Current: {{ $value | humanizePercentage }}"

